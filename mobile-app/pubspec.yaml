name: apna_medical_hall
description: A Flutter app for Apna Medical Hall pharmacy platform

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.0.5

  # HTTP requests
  http: ^1.1.0

  # Image handling
  cached_network_image: ^3.2.3
  image_picker: ^1.0.4

  # UI components
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # Utilities
  shared_preferences: ^2.2.2
  intl: ^0.19.0

  # Navigation
  go_router: ^12.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700